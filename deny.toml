[graph]
targets = ["x86_64-unknown-linux-gnu"]

[advisories]
ignore = [
    "RUSTSEC-2024-0436", # paste - unmaintained, comes from ratatui
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
]
confidence-threshold = 0.8

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
skip = [
    { name = "hashbrown", version = "0.15.5" },   # via lru (ratatui) vs indexmap (toml_edit)
    { name = "unicode-width", version = "0.1.14" }, # via unicode-truncate (ratatui) vs ratatui 0.29
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
